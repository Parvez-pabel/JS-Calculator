<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Calculator</title>
  </head>
  <body class="flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-6 rounded-2xl w-80">
      <input
        type="text"
        name="value display"
        id="display"
        disabled
        placeholder="0"
        class="w-full bg-gray-600 rounded-2xl text-white p-4 text-right mb-6 outline-none text-3xl"
      />
      <div class="grid grid-cols-4 gap-3">
        <!-- row 1 -->
        <button
          onclick="clearDisplay()"
          class="bg-red-400 rounded p-3 text-white font-bold text-xl cursor-pointer"
        >
          C
        </button>
        <button
          onclick="deleteDisplay()"
          class="bg-orange-400 rounded p-3 text-white font-bold text-xl cursor-pointer"
        >
          Del
        </button>
        <button
          onclick="appendToDisplay('÷')"
          class="bg-pink-400 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          ÷
        </button>
        <button
          onclick="appendToDisplay('x')"
          class="bg-pink-400 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          x
        </button>
        <!-- row 2 -->
        <button
          onclick="appendToDisplay('7')"
          class="bg-gray-200 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          7
        </button>
        <button
          onclick="appendToDisplay('8')"
          class="bg-gray-200 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          8
        </button>
        <button
          onclick="appendToDisplay('9')"
          class="bg-gray-200 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          9
        </button>
        <button
          onclick="appendToDisplay('%')"
          class="bg-pink-400 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          %
        </button>
        <!-- row 3 -->
        <button
          onclick="appendToDisplay('4')"
          class="bg-gray-200 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          4
        </button>
        <button
          onclick="appendToDisplay('5')"
          class="bg-gray-200 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          5
        </button>
        <button
          onclick="appendToDisplay('6')"
          class="bg-gray-200 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          6
        </button>
        <button
          onclick="appendToDisplay('+')"
          class="bg-pink-400 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          +
        </button>
        <!-- row 4 -->
        <button
          onclick="appendToDisplay('1')"
          class="bg-gray-200 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          1
        </button>
        <button
          onclick="appendToDisplay('2')"
          class="bg-gray-200 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          2
        </button>
        <button
          onclick="appendToDisplay('3')"
          class="bg-gray-200 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          3
        </button>
        <button
          onclick="appendToDisplay('-')"
          class="bg-pink-400 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          -
        </button>
        <!-- row 1 -->
        <button
          onclick="appendToDisplay('0')"
          class="bg-gray-200 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          0
        </button>
        <button
          onclick="appendToDisplay('.')"
          class="bg-gray-200 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          .
        </button>
        <button
          onclick="calculateValue()"
          class="col-span-2 bg-gray-200 rounded p-3 text-black font-bold text-xl hover:bg-gray-400 cursor-pointer"
        >
          =
        </button>
      </div>
    </div>
    <script>
      const display = document.getElementById("display");
      function appendToDisplay(input) {
        display.value = display.value + input;
      }
      function deleteDisplay() {
        display.value = display.value.slice(0, -1);
      }
      function clearDisplay() {
        display.value = "";
      }
      function calculateValue() {
        try {
          let expression = display.value
            .replace(/x/g, "*")
            .replace(/÷/g, "/")
            .replace(/(\d+)%/g, "($1/100)");
          display.value = eval(expression).toFixed(4);
        } catch (error) {
          console.error(error);
          display.value = error.message || "Math Error";
        }
      }

      document.addEventListener("keydown", function (e) {
        const key = e.key;

        if (!isNaN(key)) {
          appendToDisplay(key);
        }
        //operators
        else if (key === "+") appendToDisplay("+");
        else if (key === "-") appendToDisplay("-");
        else if (key === "*") appendToDisplay("x");
        else if (key === "/") appendToDisplay("÷");
        else if (key === "%") appendToDisplay("%");
        else if (key === ".") appendToDisplay(".");
        //enter = calculate
        else if (key === "Enter") {
          calculateValue();
        }
        // Backspace=delete last one
        else if (key === "Backspace") {
          deleteDisplay();
        }
        // Delete = clear all
        else if (key === "Delete") {
          clearDisplay();
        }
      });
    </script>
  </body>
</html>
